<nav
  id="site-navbar"
  role="navigation"
  aria-label="Main Navigation"
  class="bg-white shadow-md p-1 sticky-nav"
  [class.scrolled]="isScrolled"
>
  <div class="container mx-auto">
    <!-- Navigation with centered logo -->
    <div class="hidden md:flex items-center justify-between gap-2 px-4 md:gap-8 md:px-8">
      <!-- Left Navigation -->
      <div class="flex gap-3 md:gap-8 items-center md:flex-1 justify-center md:justify-end">
        <a
          href="#home"
          title="Diya Tattoo - Home"
          class="text-sm font-semibold text-gray-900 hover:text-red-600 hover:underline hover:underline-offset-2 transition-colors uppercase"
        >
          HOME
        </a>
        <a
          href="#about"
          title="About the Tattoo Artist"
          class="text-sm font-semibold text-gray-900 hover:text-red-600 hover:underline hover:underline-offset-2 transition-colors uppercase"
        >
          ABOUT
        </a>
      </div>

      <!-- Center Logo -->
      <a
        href="#home"
        class="flex items-center justify-center hover:opacity-90 transition-opacity flex-shrink-0"
        title="Diya Tattoo - Tattoo Artist"
      >
        <img
          src="/assets/images/diya-tattoo-logo.png"
          alt="Diya Tattoo Logo - Premium Custom Tattoo Designs"
          class="h-16 md:h-28 w-auto"
        />
      </a>

      <!-- Right Navigation -->
      <div class="flex gap-3 md:gap-8 items-center md:flex-1 justify-center md:justify-start">
        <a
          href="#gallery"
          title="Tattoo Gallery - View Our Work"
          class="text-sm font-semibold text-gray-900 hover:text-red-600 hover:underline hover:underline-offset-2 transition-colors uppercase"
        >
          GALLERY
        </a>
        <a
          href="#contact"
          title="Contact Us - Book Your Tattoo Appointment"
          class="text-sm font-semibold text-gray-900 hover:text-red-600 hover:underline hover:underline-offset-2 transition-colors uppercase"
        >
          CONTACT
        </a>
      </div>
    </div>
    <!-- Mobile Navbar -->
    <div class="md:hidden flex items-center justify-between px-4">
      <!-- Hamburger -->
      <button (click)="toggleMenu()" class="text-3xl text-black" aria-label="Menu">☰</button>

      <!-- Logo Center -->
      <a href="#home">
        <img src="/assets/images/diya-tattoo-logo.png" alt="Diya Tattoo Logo" class="h-16" />
      </a>

      <div class="w-8"></div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="mobileMenuOpen" class="md:hidden flex flex-col text-center gap-4 pb-4">
      <a href="#home" (click)="toggleMenu()" class="nav-link"> HOME </a>

      <a href="#about" (click)="toggleMenu()" class="nav-link"> ABOUT </a>

      <a href="#gallery" (click)="toggleMenu()" class="nav-link"> GALLERY </a>

      <a href="#contact" (click)="toggleMenu()" class="nav-link"> CONTACT </a>
    </div>
  </div>
</nav>
